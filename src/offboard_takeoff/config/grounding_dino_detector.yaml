grounding_dino_detector:
  ros__parameters:
    use_sim_time: true
    image_topic: /camera/image_raw
    model_id: IDEA-Research/grounding-dino-tiny
    cache_dir: /home/dron/px4_offboard_clean_ws/models
    prompt_text: person
    target_labels:
      - person
    box_threshold: 0.35
    text_threshold: 0.25
    processing_max_rate_hz: 2.0
    publish_debug_image: true
    debug_image_max_rate_hz: 2.0
    detection_hold_sec: 0.75
    prefer_cuda: true
    use_half: false
